name: Build & publish sidecar image

on:
  push:
    branches: [main, feat/snapshotter-in-go]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      # Static analysis only — `go test ./...` exercises a TS harness
      # in testharness/ that needs Node + npm deps we don't install
      # here. Add a separate test job if/when that's wired up.
      - name: go vet
        run: go vet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login on PRs — we don't push images from forks.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # PRs build but don't push — verifies the Dockerfile still
          # compiles before merging.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # After a successful push of a new sidecar image, notify the downstream
  # mono-better repo so it rebuilds its zero-cache+go image against the
  # fresh go-ivm:latest. Without this, a marker commit to mono-better
  # could race the go-ivm publish job and bundle the previous binary.
  #
  # Requires repo secret MONO_DISPATCH_TOKEN — a PAT (classic with `repo`
  # scope, OR fine-grained on kartikparsoya-eng/mono-better with
  # Contents:read + Metadata:read + Actions:write). The default
  # GITHUB_TOKEN is scoped to this repo only and cannot dispatch
  # cross-repo. The step is a no-op (warning-only) if the secret is unset
  # so the workflow stays green during initial setup.
  notify-downstream:
    needs: build
    # Fire on EVERY publishing push (any configured branch + version
    # tags), not just main: the mono image bundles this repo's binary, so
    # a feature-branch publish that doesn't dispatch leaves the
    # downstream rebuild racing the binary publish — mono builds
    # triggered by the same logical change pulled the PREVIOUS sidecar
    # (observed 2026-06-11: mono 87e6fa259 bundled b1c1a58 instead of
    # b6c5c39 because this gate skipped on feat/snapshotter-in-go).
    # PRs and forks never carry the secret, so the push gate suffices.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch repository_dispatch event to mono-better
        env:
          MONO_DISPATCH_TOKEN: ${{ secrets.MONO_DISPATCH_TOKEN }}
        run: |
          if [ -z "${MONO_DISPATCH_TOKEN}" ]; then
            echo "::warning::MONO_DISPATCH_TOKEN secret not set — skipping downstream notify. See workflow comment for setup."
            exit 0
          fi
          payload=$(jq -n \
            --arg sha "${GITHUB_SHA}" \
            --arg ref "${GITHUB_REF}" \
            --arg repo "${GITHUB_REPOSITORY}" \
            '{event_type:"go-ivm-published", client_payload:{go_ivm_sha:$sha, go_ivm_ref:$ref, go_ivm_repo:$repo}}')
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${MONO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/kartikparsoya-eng/mono-better/dispatches \
            -d "${payload}")
          if [ "${http_code}" != "204" ]; then
            echo "::error::Dispatch failed with HTTP ${http_code}"
            cat /tmp/resp.json
            exit 1
          fi
          echo "Dispatched go-ivm-published event to mono-better for go-ivm@${GITHUB_SHA}"
