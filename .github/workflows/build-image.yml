name: Build & publish sidecar image

on:
  push:
    branches: [main, feat/snapshotter-in-go]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      # Static analysis only — `go test ./...` exercises a TS harness
      # in testharness/ that needs Node + npm deps we don't install
      # here. Add a separate test job if/when that's wired up.
      - name: go vet
        run: go vet ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Skip login on PRs — we don't push images from forks.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          # PRs build but don't push — verifies the Dockerfile still
          # compiles before merging.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # After a successful push of a new sidecar image, trigger the downstream
  # mono-better build so it rebuilds its zero-cache+go image against the
  # freshly published go-ivm:feat-snapshotter-in-go binary. Without this,
  # a marker commit to mono-better could race the go-ivm publish job and
  # bundle the previous binary.
  #
  # We use a workflow_dispatch (NOT repository_dispatch) pinned to the
  # feat/snapshotter-in-go ref. This is load-bearing: a repository_dispatch
  # ALWAYS runs the workflow from mono-better's DEFAULT branch
  # (feat/go-ivm-sidecar-async-advance), whose legacy workflow builds the
  # primary/shadow `latest` lineage from go-ivm:latest — NOT the
  # tablesrc-/shadow-tablesrc- images we actually deploy. So the dispatch
  # silently rebuilt the wrong image and the deployed tag kept a stale
  # binary (observed 2026-06-23: dispatch ran on the default branch and
  # produced shadow-latest instead of tablesrc-feat-snapshotter-in-go).
  # workflow_dispatch with an explicit ref runs the feat/snapshotter-in-go
  # workflow file in its own context (correct tablesrc matrix + build-args
  # + pulls go-ivm:feat-snapshotter-in-go), so the deployed image gets the
  # new binary. The mono workflow must exist on the default branch with a
  # workflow_dispatch trigger for the API to accept this (it does).
  #
  # Requires repo secret MONO_DISPATCH_TOKEN — a PAT (classic with `repo`
  # scope, OR fine-grained on kartikparsoya-eng/mono-better with
  # Contents:read + Metadata:read + Actions:write). The default
  # GITHUB_TOKEN is scoped to this repo only and cannot dispatch
  # cross-repo. The step is a no-op (warning-only) if the secret is unset
  # so the workflow stays green during initial setup.
  notify-downstream:
    needs: build
    # Only a feat/snapshotter-in-go publish should rebuild the mono
    # feat/snapshotter-in-go image — that's the branch whose tablesrc
    # image bundles THIS branch's binary. main/tag pushes publish
    # go-ivm:latest for other lineages and must not retag the feat image
    # with a mismatched binary. PRs and forks never carry the secret.
    if: github.event_name == 'push' && github.ref == 'refs/heads/feat/snapshotter-in-go'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger mono-better build on feat/snapshotter-in-go (workflow_dispatch)
        env:
          MONO_DISPATCH_TOKEN: ${{ secrets.MONO_DISPATCH_TOKEN }}
          # The mono-better branch whose workflow file + zero-cache source
          # is (re)built against the freshly published sidecar binary.
          MONO_TARGET_REF: feat/snapshotter-in-go
          MONO_WORKFLOW_FILE: build-zero-cache-go.yml
        run: |
          if [ -z "${MONO_DISPATCH_TOKEN}" ]; then
            echo "::warning::MONO_DISPATCH_TOKEN secret not set — skipping downstream notify. See workflow comment for setup."
            exit 0
          fi
          payload=$(jq -n --arg ref "${MONO_TARGET_REF}" '{ref:$ref}')
          http_code=$(curl -sS -o /tmp/resp.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${MONO_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/kartikparsoya-eng/mono-better/actions/workflows/${MONO_WORKFLOW_FILE}/dispatches" \
            -d "${payload}")
          # workflow_dispatch returns 204 No Content on success.
          if [ "${http_code}" != "204" ]; then
            echo "::error::workflow_dispatch failed with HTTP ${http_code}"
            cat /tmp/resp.json
            exit 1
          fi
          echo "Triggered mono-better ${MONO_WORKFLOW_FILE} on ${MONO_TARGET_REF} for go-ivm@${GITHUB_SHA}"
